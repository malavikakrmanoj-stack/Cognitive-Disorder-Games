<!DOCTYPE html>
<html>
<head>
<title>Sorter Game</title>
<meta charset="UTF-8"
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
  --surface: #ffffff;
  --surface2: #f0ede8;
  --text: #2d3436;
  --border: #e0dbd5;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: max(env(safe-area-inset-top), 8px)
    max(env(safe-area-inset-right), 12px) 8px
    max(env(safe-area-inset-left), 12px);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 8px;
  min-height: 52px;
}

.back-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
  min-height: 38px;
}

.header-title {
  font-size: clamp(15px, 4vw, 18px);
  font-weight: 700;
  text-align: center;
  flex: 1;
}

.header-spacer {
  /* mirrors back-btn width to keep title centred */
  min-width: 70px;
}
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#f5f7fa;
  overflow:hidden;
}

.shape{
  position:fixed;
  opacity:0.28;
  z-index:-1;
}

.c1{width:70px;height:70px;border-radius:50%;background:#e8bcbc;top:40px;left:30px;}
.s1{width:65px;height:65px;background:#bcd6e8;top:180px;left:25px;} /* middle-left */
.t1{
  width:0;height:0;
  border-left:30px solid transparent;
  border-right:30px solid transparent;
  border-bottom:55px solid #bfe3cd;
  bottom:120px;left:40px;
}
.star1{font-size:45px;color:#e6d8a8;bottom:40px;left:60px;}

.c2{width:70px;height:70px;border-radius:50%;background:#d9bce8;top:60px;right:30px;}
.s2{width:65px;height:65px;background:#cddff5;top:220px;right:25px;} /* middle-right */
.t2{
  width:0;height:0;
  border-left:28px solid transparent;
  border-right:28px solid transparent;
  border-bottom:50px solid #cde3bf;
  bottom:140px;right:35px;
}
.star2{font-size:50px;color:#e8ddb0;bottom:60px;right:70px;}

.midL{
  width:60px;height:60px;
  background:#e2c9f2;
  left:120px;
  top:250px;
}
.midR{
  width:0;height:0;
  border-left:25px solid transparent;
  border-right:25px solid transparent;
  border-bottom:45px solid #c9f2dc;
  right:120px;
  top:300px;
}

#game{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

canvas{background:transparent;}

#top{
  font-size:18px;
  margin-bottom:5px;
}
#rule{
  font-size:15px;
  margin-bottom:12px;
}

.btns{
  text-align:center;
  margin-top:25px auto;
}
.btns button{
  display:inline-block;
  width:80px;
  height:40px;
  margin:0 8px;
  border:none;
  border-radius:6px;
  color:white;
  font-size:13px;
}

.left{background:#c96f6f;}
.right{background:#6f9cc9;}
.restart{background:grey;}

#result{
  margin-top:15px;
  font-size:18px;
}

#finalScore{
  margin-top:8px;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="shape c1"></div>
<div class="shape s1"></div>
<div class="shape t1"></div>
<div class="shape star1">★</div>

<div class="shape c2"></div>
<div class="shape s2"></div>
<div class="shape t2"></div>
<div class="shape star2">★</div>

<!-- NEW CENTER SIDE SHAPES -->
<div class="shape midL"></div>
<div class="shape midR"></div>

<!-- GAME -->
<div id="game">
<div id="top"></div>
<div id="rule"></div>

<canvas id="canvas" width="200" height="200"></canvas>

<div class="btns">
  <button class="left" onclick="check('L')">LEFT</button>
  <button class="right" onclick="check('R')">RIGHT</button>
  <button class="restart" onclick="restart()">RESTART</button>
</div>

<div id="result"></div>
<div id="finalScore"></div>
</div>

<script>
const Sound={
  ctx:null,
  init(){
    const A=window.AudioContext||window.webkitAudioContext;
    if(!this.ctx) this.ctx=new A();
  },
  tone(f,t){
    this.init();
    const o=this.ctx.createOscillator();
    const g=this.ctx.createGain();
    o.frequency.value=f;
    g.gain.value=0.05;
    o.connect(g);g.connect(this.ctx.destination);
    o.start();o.stop(this.ctx.currentTime+t);
  },
  correct(){
    this.tone(500,0.08);
    setTimeout(()=>this.tone(650,0.08),80);
    setTimeout(()=>this.tone(800,0.08),160);
  },
  wrong(){
    this.tone(220,0.2);
  }
};

const shapes=["circle","square","triangle","star"];
const colors={
  red:"#c96f6f",
  blue:"#6f9cc9",
  green:"#6fb089",
  yellow:"#d4c06a"
};

let score=0,level=1,gameOver=false;
let ruleType,ruleValue,ruleSide,current;

const ctx=document.getElementById("canvas").getContext("2d");

function newRound(){
  if(gameOver) return;

  if(level===1) ruleType="color";
  else if(level===2) ruleType="shape";
  else ruleType=Math.random()<0.5?"color":"shape";

  ruleSide=Math.random()<0.5?"LEFT":"RIGHT";

  let shape=shapes[Math.floor(Math.random()*shapes.length)];
  let keys=Object.keys(colors);
  let color=keys[Math.floor(Math.random()*keys.length)];

  current={shape,color};
  ruleValue=ruleType==="color"?color:shape;

  draw(shape,colors[color]);

  document.getElementById("top").innerText=
    "Level: "+level+" | Score: "+score;

  document.getElementById("rule").innerText=
    ruleType==="color"
    ? "If the color is "+ruleValue+", press "+ruleSide
    : "If the shape is "+ruleValue+", press "+ruleSide;
}

function draw(shape,color){
  ctx.clearRect(0,0,200,200);
  ctx.fillStyle=color;

  if(shape==="circle"){
    ctx.beginPath();
    ctx.arc(100,100,50,0,Math.PI*2);
    ctx.fill();
  }
  if(shape==="square"){
    ctx.fillRect(50,50,100,100);
  }
  if(shape==="triangle"){
    ctx.beginPath();
    ctx.moveTo(100,40);
    ctx.lineTo(40,160);
    ctx.lineTo(160,160);
    ctx.fill();
  }
  if(shape==="star"){
    ctx.font="70px Arial";
    ctx.fillText("★",60,140);
  }
}

function check(choice){
  if(gameOver) return;

  let match = (ruleType==="color")
    ? current.color===ruleValue
    : current.shape===ruleValue;

  let correct = (ruleSide==="LEFT")
    ? (match && choice==="L") || (!match && choice==="R")
    : (match && choice==="R") || (!match && choice==="L");

  if(correct){
    score++;
    document.getElementById("result").innerText="Correct 😊";
    Sound.correct();

    if(score===5) level=2;
    if(score===10) level=3;

    setTimeout(newRound,700);
  } else {
    gameOver=true;
    document.getElementById("result").innerText="Game Over – Press Restart";
    document.getElementById("finalScore").innerText="Score: "+score;
    Sound.wrong();
  }
}

function restart(){
  score=0;
  level=1;
  gameOver=false;
  document.getElementById("result").innerText="";
  document.getElementById("finalScore").innerText="";
  newRound();
}

newRound();
</script>

</body>
</html>
